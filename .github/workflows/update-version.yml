name: Reusable Update Version JSON

on:
  workflow_call:
    inputs:
      head_branch:
        description: 'The branch or tag name to extract version from'
        required: true
        type: string
      target_branch:
        description: 'The destination branch to push version.json to (defaults to master)'
        required: false
        type: string
        default: 'master'
      target_folder:
        description: 'The specific folder to save version.json (e.g., config, assets/info)'
        required: false
        type: string
        default: 'version'
      extra_downloads:
        description: 'JSON string of additional download links (e.g., {"curseforge": "url"})'
        required: false
        type: string
        default: '{}'
    secrets:
      PAT_TOKEN:
        required: false
        description: 'Personal Access Token used to bypass branch protection rules'

  workflow_dispatch:
    inputs:
      head_branch:
        description: 'Branch or Tag name to extract version from (e.g., v1.0.0, master)'
        required: true
        type: string
      target_branch:
        description: 'The destination branch to push version.json to'
        required: false
        type: string
        default: 'master'
      target_folder:
        description: 'The specific folder to save version.json'
        required: false
        type: string
        default: 'version'
      extra_downloads:
        description: 'JSON string of additional download links'
        required: false
        type: string
        default: '{}'

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          ref: ${{ inputs.head_branch }}
          fetch-depth: 0

      - name: Extract version from Tag
        id: get_version
        run: |
          RAW_TAG="${{ inputs.head_branch }}"
          CLEAN_VERSION=$(echo "$RAW_TAG" | sed 's/^[^0-9]*//')
          if [ -z "$CLEAN_VERSION" ]; then
            CLEAN_VERSION="unknown"
          fi
          echo "VERSION=$CLEAN_VERSION" >> $GITHUB_OUTPUT
          echo "TAG_NAME=$RAW_TAG" >> $GITHUB_OUTPUT
          echo "Extracted Version: $CLEAN_VERSION from Tag: $RAW_TAG"

      - name: Generate and Merge version.json
        id: merge_json
        shell: bash
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          TAG_NAME="${{ steps.get_version.outputs.TAG_NAME }}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          RELEASE_URL="$REPO_URL/releases/tag/$TAG_NAME"
          
          cat <<EOF > base_version.json
          {
            "minecraft": "1.7.10",
            "version": "$VERSION",
            "download": {
              "github": "$RELEASE_URL"
            }
          }
          EOF

          TARGET_DIR="${{ inputs.target_folder }}"
          mkdir -p "$TARGET_DIR"

          EXTRA_INPUTS='${{ inputs.extra_downloads }}'
          jq --argjson extra "$EXTRA_INPUTS" '.download += $extra' base_version.json > "$TARGET_DIR/version.json"
          
          echo "=== Final $TARGET_DIR/version.json ==="
          cat "$TARGET_DIR/version.json"

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          TARGET_DIR="${{ inputs.target_folder }}"
          git add "$TARGET_DIR/version.json"
          
          if git diff --staged --quiet; then
            echo "No changes detected in version.json. Skipping commit."
          else
            git commit -m "chore: update $TARGET_DIR/version.json to ${{ steps.get_version.outputs.VERSION }} [skip ci]"
          
            DEST_BRANCH="${{ inputs.target_branch }}"
          
            if [ -z "$DEST_BRANCH" ]; then
              DEST_BRANCH="master"
            fi
          
            echo "Pushing changes straight to branch: $DEST_BRANCH"
            git push origin HEAD:$DEST_BRANCH
          fi