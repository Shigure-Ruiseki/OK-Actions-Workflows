name: Update version JSON

on:
  workflow_call:
    inputs:
      head_branch:
        description: 'The branch or tag name passed from the caller workflow'
        required: true
        type: string
      extra_downloads:
        description: 'JSON string of additional download links (e.g., {"curseforge": "url"})'
        required: false
        type: string
        default: '{}'

permissions:
  contents: write
jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_branch }}
          fetch-depth: 0

      - name: Extract version from Tag
        id: get_version
        run: |
          RAW_TAG="${{ inputs.head_branch }}"
          CLEAN_VERSION=$(echo "$RAW_TAG" | sed 's/^[^0-9]*//')
          echo "VERSION=$CLEAN_VERSION" >> $GITHUB_OUTPUT
          echo "TAG_NAME=$RAW_TAG" >> $GITHUB_OUTPUT
          echo "Extracted Version: $CLEAN_VERSION from Tag: $RAW_TAG"

      - name: Generate and Merge version.json
        id: merge_json
        shell: bash
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          TAG_NAME="${{ steps.get_version.outputs.TAG_NAME }}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          RELEASE_URL="$REPO_URL/releases/tag/$TAG_NAME"

          cat <<EOF > base_version.json
          {
            "minecraft": "1.7.10",
            "version": "$VERSION",
            "download": {
              "github": "$RELEASE_URL"
            }
          }
          EOF

          EXTRA_INPUTS='${{ inputs.extra_downloads }}'

          jq --argjson extra "$EXTRA_INPUTS" '.download += $extra' base_version.json > version.json

          echo "=== Final version.json ==="
          cat version.json

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add version.json

          if git diff --staged --quiet; then
            echo "No changes detected in version.json. Skipping commit."
          else
            git commit -m "chore: update version.json to v${{ steps.get_version.outputs.VERSION }} [skip ci]"
            git push origin HEAD:${{ inputs.head_branch }}
          fi
